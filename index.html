.hdr .sub{font-size:0.72em;color:var(--text2)}

.bnav button.ac{color:var(--accent)}

.mr.lv{border-left:3px solid var(--live);background:rgba(239,68,68,0.03)}

.mr .mt .d{font-size:0.6em;color:var(--text2);font-weight:400}
.mr .tm{flex:1;min-width:0}

.bg-ft{background:rgba(34,197,94,0.2);color:var(--win)}
.bg-ns{background:rgba(136,150,176,0.12);color:var(--text2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.dot{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;animation:pulse 1.2s infinite}
.tbl{width:100%;border-collapse:collapse;font-size:0.73em}
.tbl th{text-align:left;padding:5px 6px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);font-size:0.85em}

.ps .s{font-size:1.1em}
.ps .pct{font-size:0.65em;color:var(--text2)}

.br-match .tm{display:flex;justify-content:space-between;padding:2px 0}
.sel{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.75em;width:100%}

    ['E','DR Congo','Uzbekistan','K','Mercedes-Benz Stadium, 亚特兰大',6,27,19],
    ['E','Algeria','Austria','J','Arrowhead Stadium, 堪萨斯城',6,27,22],
    ['E','Jordan','Argentina','J','AT&T Stadium, 达拉斯',6,27,22],
  ];

  return raw.map(r => {
    let bjMo, bjDay, bjH, venue, t1en, t2en, grp;
    t1en = r[1]; t2en = r[2]; grp = r[3]; venue = r[4];

    if (r[0] === 'U') {
      // Use API UTC timestamp (MOST RELIABLE)
      const utcStr = r[5]; // "2026-06-11T19:00:00"
      const [datePart, timePart] = utcStr.split('T');
      const [, utcMo, utcDay] = datePart.split('-').map(Number);
      const utcH = parseInt(timePart.split(':')[0]);
      // Beijing = UTC + 8
      let bjHr = utcH + 8;
      let bjDy = utcDay, bjMoVal = utcMo;
      if (bjHr >= 24) { bjHr -= 24; bjDy++; }
      bjMo = bjMoVal; bjDay = bjDy; bjH = bjHr;
    } else {
      // Use EDT hour (official schedule)
      const edtMo = r[5], edtDay = r[6], edtH = r[7];
      // EDT (UTC-4) → Beijing (UTC+8): +12 hours
      let bjHr = edtH + 12;
      let bjDy = edtDay, bjMoVal = edtMo;
      if (bjHr >= 24) { bjHr -= 24; bjDy++; }
      bjMo = bjMoVal; bjDay = bjDy; bjH = bjHr;
    }

    const t1zh = ZH[t1en] || t1en;
    const t2zh = ZH[t2en] || t2en;
    const bjTime = `${String(bjH).padStart(2,'0')}:00`;
    const dateStr = `2026-${String(bjMo).padStart(2,'0')}-${String(bjDay).padStart(2,'0')}`;

    return { t1en, t2en, t1zh, t2zh, grp, venue, bjMo, bjDay, bjH, bjTime, dateStr,
             id: `${t1en}-${t2en}-g${grp}` };
  });
}

let liveScores = {};

async function fetchLiveScores() {
  try {
    const r = await fetch('https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4429&s=2026');
    if (!r.ok) return false;
    const d = await r.json();
    if (!d.events) return false;
    d.events.forEach(ev => {
      const t1zh = ZH[ev.strHomeTeam] || ev.strHomeTeam;
      const t2zh = ZH[ev.strAwayTeam] || ev.strAwayTeam;
      SCHEDULE.forEach(s => {
        if ((s.t1zh===t1zh && s.t2zh===t2zh) || (s.t1en===ev.strHomeTeam && s.t2en===ev.strAwayTeam)) {
          liveScores[s.id] = {
            s1: ev.intHomeScore!==null ? parseInt(ev.intHomeScore) : null,
            s2: ev.intAwayScore!==null ? parseInt(ev.intAwayScore) : null,
            st: ev.strStatus || 'NS',
          };
        }
      });
    });
    updateELO();
    return true;
  } catch(e) { return false; }
}

function getMatchScore(m) {
  const ls = liveScores[m.id];
  if (!ls) return {s1:null,s2:null,st:'NS'};
  if (ls.st==='NS'||ls.st==='TBD'||ls.st==='PST') return {s1:null,s2:null,st:'NS'};
  if (ls.st==='FT'||ls.st==='AET'||ls.st==='PEN') return {s1:ls.s1,s2:ls.s2,st:'FT'};
  return {s1:ls.s1??0,s2:ls.s2??0,st:'LIVE',detail:ls.st};
}

// ══════════════════════════════════════════════════════════
//  ELO ENGINE
// ══════════════════════════════════════════════════════════
let elo = {...BASE_ELO};

function updateELO() {
  elo = {...BASE_ELO};
  SCHEDULE.forEach(m => {
    const ls = liveScores[m.id];
    if (!ls || ls.st!=='FT' || ls.s1===null) return;
    const r1=elo[m.t1zh]||1500, r2=elo[m.t2zh]||1500;
    const e1=1/(1+Math.pow(10,(r2-r1)/400)), e2=1-e1;
    const K=32;
    let a1,a2;
    if(ls.s1>ls.s2){a1=1;a2=0}else if(ls.s1<ls.s2){a1=0;a2=1}else{a1=0.5;a2=0.5}
    elo[m.t1zh]=Math.round(r1+K*(a1-e1));
    elo[m.t2zh]=Math.round(r2+K*(a2-e2));
  });
}

// ══════════════════════════════════════════════════════════
//  SCORE PREDICTION (ELO + Poisson)
// ══════════════════════════════════════════════════════════
function poisson(k, lambda) {
  if (lambda <= 0) return k === 0 ? 1 : 0;
  let p = Math.exp(-lambda);
  for (let i = 1; i <= k; i++) p *= lambda / i;
  return p;
}

function predictScore(t1zh, t2zh) {
  const r1=elo[t1zh]||1500, r2=elo[t2zh]||1500;
  const diff = (r1 - r2) / 400;
  const avgG = 1.35;
  const lambda1 = Math.max(0.3, avgG + diff * 0.55);
  const lambda2 = Math.max(0.3, avgG - diff * 0.55);
  const e1 = 1/(1+Math.pow(10,(r2-r1)/400));
  const drawP = 0.26 * (1 - Math.abs(r1-r2)/500);
  const win1P = Math.max(0.03, e1 - drawP/2);
  const win2P = Math.max(0.03, 1 - e1 - drawP/2);
  const scores = [];
  for (let i=0;i<=5;i++) {
    for (let j=0;j<=5;j++) {
      if (i+j > 8) continue;
      const prob = poisson(i,lambda1) * poisson(j,lambda2) * 100;
      if (prob > 0.3) scores.push({s1:i, s2:j, prob: Math.round(prob*10)/10});
    }
  }
  scores.sort((a,b)=>b.prob-a.prob);
  return {
    win1P: Math.round(win1P*100), drawP: Math.round(drawP*100), win2P: Math.round(win2P*100),
    topScores: scores.slice(0, 6), lambda1: Math.round(lambda1*10)/10, lambda2: Math.round(lambda2*10)/10, r1, r2
  };
}

function getForm(teamZh) {
  const fm = [];
  SCHEDULE.forEach(m => {

    if (!ls || ls.st!=='FT' || ls.s1===null) return;
    if (m.t1zh===teamZh) fm.push(ls.s1>ls.s2?'W':ls.s1<ls.s2?'L':'D');
    else if (m.t2zh===teamZh) fm.push(ls.s2>ls.s1?'W':ls.s2<ls.s1?'L':'D');
  });
  return fm.slice(-5);
}

function getStandings() {
  const st = {};
  Object.values(GROUPS).flat().forEach(t=>{st[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,mp:0};});
  SCHEDULE.forEach(m => {
    const ls = liveScores[m.id];
    if (!ls || ls.st!=='FT' || ls.s1===null) return;
    const a=st[m.t1zh], b=st[m.t2zh];
    if(!a||!b) return;
    a.gf+=ls.s1;a.ga+=ls.s2;a.mp++;
    b.gf+=ls.s2;b.ga+=ls.s1;b.mp++;
    a.gd=a.gf-a.ga;b.gd=b.gf-b.ga;
    if(ls.s1>ls.s2){a.p+=3;a.w++;b.l++}
    else if(ls.s1<ls.s2){b.p+=3;b.w++;a.l++}
    else{a.p++;b.p++;a.d++;b.d++}
  });
  return st;
}

function getH2H(t1zh,t2zh){
  const rec=H2H.filter(h=>(h.t1===t1zh&&h.t2===t2zh)||(h.t1===t2zh&&h.t2===t1zh));
  let w1=0,w2=0,draws=0;
  const matches=[];
  rec.forEach(h=>{
    const ft=h.t1===t1zh;
    if(h.s1===h.s2)draws++;
    else if(ft&&h.s1>h.s2)w1++;
    else if(!ft&&h.s2>h.s1)w1++;
    else w2++;
    matches.push({year:h.year,score:ft?`${h.s1}:${h.s2}`:`${h.s2}:${h.s1}`,opp:ft?h.t2:h.t1,
      result:h.s1===h.s2?'平':((ft&&h.s1>h.s2)||(!ft&&h.s2>h.s1)?'胜':'负')});
  });
  return {total:rec.length,w1,w2,draws,matches:matches.slice(-8).reverse()};
}

      ${pred.topScores.map(s=>`<div class="ps"><div class="s">${s.s1}:${s.s2}</div><div class="pct">${s.prob}%</div></div>`).join('')}
    </div>
  </div>`;
  document.getElementById('h2hRes').innerHTML=html;
}

function renderStand(){
  const st=getStandings();
  const gkeys=Object.keys(GROUPS);
  const gcolors=['#3b82f6','#8b5cf6','#ec4899','#f97316','#22c55e','#06b6d4','#e11d48','#a855f7','#14b8a6','#f43f5e','#6366f1','#84cc16'];
  let html='';
  gkeys.forEach((g,gi)=>{
    const teams=GROUPS[g].map(t=>({name:t,...st[t]})).sort((a,b)=>b.p-a.p||b.gd-a.gd||b.gf-a.gf);
    html+=`<div class="crd">
      <div class="crd-h" style="color:${gcolors[gi]}">${g}组</div>
      <table class="tbl">
        <tr><th>#</th><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进/失</th><th>净</th><th>分</th></tr>`;
    teams.forEach((t,i)=>{
      html+=`<tr>
        <td style="font-weight:700;color:${i<2?'var(--gold)':i===2?'var(--accent)':'var(--text2)'}">${i+1}</td>
        <td>${FL[t.name]||'🏳'} ${t.name}</td>
        <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}/${t.ga}</td><td style="color:${t.gd>0?'var(--win)':t.gd<0?'var(--lose)':'var(--text2)'}">${t.gd>0?'+':''}${t.gd}</td>
        <td style="font-weight:700">${t.p}</td></tr>`;
    });
    html+='</table></div>';
  });
  html+='<div style="font-size:0.65em;color:var(--text2);padding:6px">📌 每组前2名 + 最佳8个第3名 → 32强 | 积分从实时比分自动计算</div>';
  document.getElementById('main').innerHTML=html;
}

function renderPredict(){
  const upcoming=SCHEDULE.filter(m=>getMatchScore(m).st==='NS').slice(0,8);
  let html=`<div class="crd"><div class="crd-h">🤖 焦点比赛比分预测</div>
    <div style="font-size:0.65em;color:var(--text2);margin-bottom:8px">ELO评分 + 泊松分布 · 预测比分及概率</div>`;
  upcoming.forEach(m=>{
    const pred=predictScore(m.t1zh,m.t2zh);
    html+=`<div style="margin-bottom:10px;padding:10px;background:rgba(255,255,255,0.01);border-radius:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.78em;margin-bottom:6px">
        <span style="font-weight:700">${FL[m.t1zh]||''} ${m.t1zh}</span>
        <span style="color:var(--text2);font-size:0.8em">vs</span>
        <span style="font-weight:700">${FL[m.t2zh]||''} ${m.t2zh}</span>
        <span style="font-size:0.7em;color:var(--text2)">${m.bjMo}/${m.bjDay} ${m.bjTime}</span>
      </div>
      <div class="pbar">
        <div class="pa" style="width:${pred.win1P}%">${pred.win1P}%</div>
        <div class="pd" style="width:${pred.drawP}%">平${pred.drawP}%</div>
        <div class="pb" style="width:${pred.win2P}%">${pred.win2P}%</div>
      </div>
      <div class="pscores">${pred.topScores.slice(0,4).map(s=>`<div class="ps"><div class="s">${s.s1}:${s.s2}</div><div class="pct">${s.prob}%</div></div>`).join('')}</div>
    </div>`;
  });
  html+='</div>';

  const teams=Object.values(GROUPS).flat().sort();
  html+=`<div class="crd"><div class="crd-h">🔍 自定义预测</div>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="pt1" class="sel">${teams.map(t=>`<option>${FL[t]||''} ${t}</option>`).join('')}</select>
      <span style="color:var(--text2)">vs</span>
      <select id="pt2" class="sel">${teams.map((t,i)=>`<option ${i===2?'selected':''}>${FL[t]||''} ${t}</option>`).join('')}</select>
      <button onclick="predCustom()" style="padding:7px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:0.75em;cursor:pointer;white-space:nowrap">预测</button>
    </div>
    <div id="predCustomRes" style="margin-top:10px"></div></div>`;
  document.getElementById('main').innerHTML=html;
}

function predCustom(){
  const t1full=document.getElementById('pt1')?.value||'';
  const t2full=document.getElementById('pt2')?.value||'';
  const t1zh=t1full.replace(/^[^\s]+\s/,'');
  const t2zh=t2full.replace(/^[^\s]+\s/,'');
  const pred=predictScore(t1zh,t2zh);
  document.getElementById('predCustomRes').innerHTML=`
    <div class="pbar" style="height:28px;font-size:0.72em">
      <div class="pa" style="width:${pred.win1P}%">${FL[t1zh]||''} ${pred.win1P}%</div>
      <div class="pd" style="width:${pred.drawP}%">平${pred.drawP}%</div>
      <div class="pb" style="width:${pred.win2P}%">${pred.win2P}% ${FL[t2zh]||''}</div>
    </div>
    <div style="font-size:0.68em;color:var(--text2);margin:4px 0">ELO: ${t1zh} ${pred.r1} - ${pred.r2} ${t2zh} | 预期进球: ${pred.lambda1}:${pred.lambda2}</div>
    <div class="pscores">${pred.topScores.slice(0,6).map(s=>`<div class="ps"><div class="s">${s.s1}:${s.s2}</div><div class="pct">${s.prob}%</div></div>`).join('')}</div>`;
}

//  INIT
// ══════════════════════════════════════════════════════════
async function refresh(showToast){
  const ok=await fetchLiveScores();
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('updTime').textContent=ok?`✅ ${ts}`:`⚠️ ${ts}`;
  const liveCount=SCHEDULE.filter(m=>getMatchScore(m).st==='LIVE').length;
  const badge=document.getElementById('liveBadge');
  if(liveCount>0){badge.style.display='inline';document.getElementById('liveCnt').textContent=`${liveCount}场进行中`}
  else badge.style.display='none';
  const R={sched:renderSched,analysis:renderAnalysis,h2h:renderH2H,stand:renderStand,predict:renderPredict};
  if(R[cur])R[cur]();
  if(showToast)toast(ok?'✅ 数据已更新':'⚠️ 刷新失败',!ok);
}

function toast(msg,err){
  const t=document.createElement('div');
  t.className='toast'+(err?' e':'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)<60)return;
  const tabs=['sched','analysis','h2h','stand','predict'];
  const i=tabs.indexOf(cur);
  if(dx<-50&&i<tabs.length-1)tab(tabs[i+1]);
  else if(dx>50&&i>0)tab(tabs[i-1]);
});

async function init(){
  document.getElementById('updTime').textContent='🔄 加载中...';
  await refresh(false);
  setInterval(()=>refresh(false),60000);
  if('serviceWorker' in navigator){
    try{await navigator.serviceWorker.register('sw.js')}catch(e){}
  }
}

init();
console.log('🏆 2026 世界杯大数据分析 · 北京时间 UTC+8 · 数据: TheSportsDB API + FIFA官方赛程');
</script>
